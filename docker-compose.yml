configs:
  values-env:
    content: |
      export SECONDS_PER_SLOT=6
      export NUMBER_OF_VALIDATORS=1
      export EL_AND_CL_MNEMONIC='test test test test test test test test test test test junk'
      export GENESIS_TIMESTAMP=$(date +%s)
      export GENESIS_DELAY=20

services:
  # Genesis generator - creates all config files
  genesis:
    image: ethpandaops/ethereum-genesis-generator:5.3.0
    container_name: genesis
    profiles: ["l1"]
    command: all
    configs:
      - source: values-env
        target: /config/values.env
    volumes:
      - genesis-data:/data

  # Execution Layer - Geth
  geth:
    image: ethereum/client-go@sha256:84e72946ce7034e9e4623385fe2ad15d995135e5cf61ae80bf32bb2a525f77ed
    container_name: geth
    profiles: ["l1"]
    command:
      - --datadir=/execution-data
      - --http
      - --http.addr=0.0.0.0
      - --http.port=8545
      - --http.api=eth,net,web3,debug,txpool,engine,admin,personal
      - --http.corsdomain=*
      - --http.vhosts=*
      - --ws
      - --ws.addr=0.0.0.0
      - --ws.port=8546
      - --ws.api=eth,net,web3,debug,txpool,engine
      - --ws.origins=*
      - --authrpc.addr=0.0.0.0
      - --authrpc.port=8551
      - --authrpc.vhosts=*
      - --authrpc.jwtsecret=/genesis-data/metadata/jwtsecret
      - --syncmode=full
      - --gcmode=archive
      - --nodiscover
      - --maxpeers=0
      - --verbosity=3
      - --miner.gasprice=1
      - --miner.recommit=100ms
      - --rpc.allow-unprotected-txs
    ports:
      - "8545:8545"
      - "8546:8546"
      - "8551:8551"
    volumes:
      - geth-data:/execution-data
      - genesis-data:/genesis-data
    depends_on:
      geth-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8545"]
      interval: 3s
      timeout: 3s
      retries: 30

  # Initialize Geth
  geth-init:
    image: ethereum/client-go@sha256:84e72946ce7034e9e4623385fe2ad15d995135e5cf61ae80bf32bb2a525f77ed
    container_name: geth-init
    profiles: ["l1"]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ ! -d /execution-data/geth ]; then
          geth init --datadir=/execution-data /genesis-data/metadata/genesis.json
        fi
    volumes:
      - geth-data:/execution-data
      - genesis-data:/genesis-data
    depends_on:
      genesis:
        condition: service_completed_successfully

  # Consensus Layer - Lighthouse
  lighthouse:
    image: sigp/lighthouse@sha256:4892f483320f3920e00f61d08fdf3b38db56377562bdef0d1832ea8add09b9e8
    container_name: lighthouse
    profiles: ["l1"]
    command:
      - lighthouse
      - bn
      - --datadir=/consensus-data
      - --testnet-dir=/genesis-data/metadata
      - --execution-endpoint=http://geth:8551
      - --execution-jwt=/genesis-data/metadata/jwtsecret
      - --http
      - --http-address=0.0.0.0
      - --http-port=5052
      - --http-allow-origin=*
      - --disable-discovery
      - --disable-peer-scoring
      - --staking
      - --supernode
      - --allow-insecure-genesis-sync
      - --debug-level=info
    ports:
      - "5052:5052"
      - "9000:9000"
    volumes:
      - lighthouse-data:/consensus-data
      - genesis-data:/genesis-data
    depends_on:
      geth:
        condition: service_healthy
    restart: unless-stopped

  # Generate validator keys
  validator-keygen:
    image: ethpandaops/ethereum-genesis-generator:5.2.2
    container_name: validator-keygen
    profiles: ["l1"]
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        source /defaults/defaults.env
        source /values.env
        eth2-val-tools \
          keystores \
          --insecure \
          --out-loc /validator-keys/keys \
          --source-min 0 \
          --source-max "$$NUMBER_OF_VALIDATORS" \
          --source-mnemonic "$$EL_AND_CL_MNEMONIC"
    configs:
      - source: values-env
        target: /values.env
    volumes:
      - validator-keys:/validator-keys

  # Serves genesis.json (and other metadata) over HTTP
  genesis-server:
    image: python:3-alpine
    container_name: genesis-server
    profiles: ["l1"]
    command: python -m http.server 8080 --directory /genesis-data/metadata
    ports:
      - "8080:8080"
    volumes:
      - genesis-data:/genesis-data
    depends_on:
      genesis:
        condition: service_completed_successfully
    restart: unless-stopped

  # Validator Client - Lighthouse
  lighthouse-vc:
    image: sigp/lighthouse@sha256:4892f483320f3920e00f61d08fdf3b38db56377562bdef0d1832ea8add09b9e8
    container_name: lighthouse-vc
    profiles: ["l1"]
    command:
      - lighthouse
      - vc
      - --validators-dir=/validator-keys/keys/keys
      - --secrets-dir=/validator-keys/keys/secrets
      - --testnet-dir=/genesis-data/metadata
      - --beacon-nodes=http://lighthouse:5052
      - --init-slashing-protection
      - --suggested-fee-recipient=0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266
      - --debug-level=info
    volumes:
      - validator-keys:/validator-keys
      - genesis-data:/genesis-data
    depends_on:
      lighthouse:
        condition: service_started
      validator-keygen:
        condition: service_completed_successfully
    restart: unless-stopped

  # Blob Archiver - archives blobs from the beacon chain to local storage
  blob-archiver:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/blob-archiver:f6291e537bd9de2c3bb415cace47812b3cc19f87
    platform: linux/amd64
    container_name: blob-archiver
    profiles: ["l2"]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for lighthouse beacon API..."
        until wget -qO /tmp/genesis.json ${L1_BEACON_URL:-http://lighthouse:5052}/eth/v1/beacon/headers/genesis 2>/dev/null; do
          sleep 2
        done
        GENESIS_ROOT=$$(sed 's/.*"root":"\([^"]*\)".*/\1/' /tmp/genesis.json)
        echo "Genesis block root: $$GENESIS_ROOT"
        export BLOB_ARCHIVER_ORIGIN_BLOCK=$$GENESIS_ROOT
        exec blob-archiver
    environment:
      - BLOB_ARCHIVER_L1_BEACON_HTTP=${L1_BEACON_URL:-http://lighthouse:5052}
      - BLOB_ARCHIVER_DATA_STORE=file
      - BLOB_ARCHIVER_FILE_DIRECTORY=/data
      - BLOB_ARCHIVER_METRICS_ENABLED=true
      - BLOB_ARCHIVER_METRICS_PORT=7300
    volumes:
      - blob-data:/data
    restart: unless-stopped

  # Blob API - serves archived blobs over HTTP for OP Stack derivation
  blob-api:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/blob-archiver:f6291e537bd9de2c3bb415cace47812b3cc19f87
    platform: linux/amd64
    container_name: blob-api
    profiles: ["l2"]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for lighthouse beacon API..."
        until wget -qO /dev/null ${L1_BEACON_URL:-http://lighthouse:5052}/eth/v1/beacon/headers/head 2>/dev/null; do
          sleep 2
        done
        exec blob-api
    environment:
      - BLOB_API_L1_BEACON_HTTP=${L1_BEACON_URL:-http://lighthouse:5052}
      - BLOB_API_DATA_STORE=file
      - BLOB_API_FILE_DIRECTORY=/data
      - BLOB_API_METRICS_ENABLED=true
      - BLOB_API_METRICS_PORT=7301
    ports:
      - "5058:8000"
    volumes:
      - blob-data:/data
    depends_on:
      blob-archiver:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO", "-", "http://localhost:8000/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ========== L2 Deploy Services ==========

  # Deploy deterministic deployer contract to L1
  deploy-deterministic-deployer:
    image: ghcr.io/foundry-rs/foundry@sha256:9e591221051112fe0bb530abcaba67f43f01ebbd12a94a8632d570d5e065a8bf
    container_name: deploy-deterministic-deployer
    profiles: ["l2"]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "=== Deploying Deterministic Deployer ==="
        cast send 0x3fab184622dc19b6109349b94811493bf2a45362 \
          --value 10000000000000000 \
          --private-key ${DEPLOYER_ACCOUNT:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80} \
          --rpc-url ${L1_RPC_URL:-http://geth:8545}
        cast rpc eth_sendRawTransaction  \
          --rpc-url ${L1_RPC_URL:-http://geth:8545} || true
        echo "Deterministic deployer deployed at 0x4e59b44847b379578588920cA78FbF26c0B4956C"
    depends_on:
      l1-el-ready:
        condition: service_completed_successfully

  # Bootstrap superchain contracts on L1
  bootstrap-superchain:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-deployer@sha256:793b0b2d306a9b102fb329c83ab1bc08e0c82627ff512e817914062654ace202
    platform: linux/amd64
    container_name: bootstrap-superchain
    profiles: ["l2"]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "=== Bootstrap Superchain ==="
        op-deployer bootstrap superchain \
          --l1-rpc-url=${L1_RPC_URL:-http://geth:8545} \
          --private-key=${DEPLOYER_ACCOUNT:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80} \
          --outfile=/deployments/superchain.json \
          --superchain-proxy-admin-owner=0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266 \
          --protocol-versions-owner=0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266 \
          --guardian=0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266
        echo "Superchain bootstrap complete:"
        cat /deployments/superchain.json
    volumes:
      - deployments:/deployments
    depends_on:
      deploy-deterministic-deployer:
        condition: service_completed_successfully

  # Bootstrap OP Stack implementation contracts on L1
  bootstrap-implementations:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-deployer@sha256:793b0b2d306a9b102fb329c83ab1bc08e0c82627ff512e817914062654ace202
    platform: linux/amd64
    container_name: bootstrap-implementations
    profiles: ["l2"]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "=== Bootstrap Implementations ==="
        SUPERCHAIN_CONFIG_PROXY=$$(grep '"superchainConfigProxyAddress"' /deployments/superchain.json | sed 's/.*: *"\([^"]*\)".*/\1/')
        PROTOCOL_VERSIONS_PROXY=$$(grep '"protocolVersionsProxyAddress"' /deployments/superchain.json | sed 's/.*: *"\([^"]*\)".*/\1/')
        SUPERCHAIN_PROXY_ADMIN=$$(grep '"proxyAdminAddress"' /deployments/superchain.json | sed 's/.*: *"\([^"]*\)".*/\1/')
        echo "SuperchainConfigProxy: $$SUPERCHAIN_CONFIG_PROXY"
        echo "ProtocolVersionsProxy: $$PROTOCOL_VERSIONS_PROXY"
        echo "SuperchainProxyAdmin: $$SUPERCHAIN_PROXY_ADMIN"
        op-deployer bootstrap implementations \
          --l1-rpc-url=${L1_RPC_URL:-http://geth:8545} \
          --private-key=${DEPLOYER_ACCOUNT:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80} \
          --outfile=/deployments/implementations.json \
          --superchain-config-proxy=$$SUPERCHAIN_CONFIG_PROXY \
          --protocol-versions-proxy=$$PROTOCOL_VERSIONS_PROXY \
          --superchain-proxy-admin=$$SUPERCHAIN_PROXY_ADMIN \
          --upgrade-controller=0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266 \
          --challenger=0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266
        echo "Implementations bootstrap complete:"
        cat /deployments/implementations.json
    volumes:
      - deployments:/deployments
    depends_on:
      bootstrap-superchain:
        condition: service_completed_successfully

  # Initialize L2 deployment: scaffold intent and patch config
  l2-deploy-init:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-deployer@sha256:793b0b2d306a9b102fb329c83ab1bc08e0c82627ff512e817914062654ace202
    platform: linux/amd64
    container_name: l2-deploy-init
    profiles: ["l2"]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "=== L2 Deploy Init ==="
        OPCM_ADDRESS=$$(grep '"opcmAddress"' /deployments/implementations.json | sed 's/.*: *"\([^"]*\)".*/\1/')
        echo "OPCM address: $$OPCM_ADDRESS"
        CHAIN_ID_HEX=$$(wget -qO- --post-data='{"jsonrpc":"2.0","method":"eth_chainId","params":[],"id":1}' \
          --header='Content-Type: application/json' ${L1_RPC_URL:-http://geth:8545} | \
          sed 's/.*"result":"\([^"]*\)".*/\1/')
        L1_CHAIN_ID=$$(printf "%d" "$$CHAIN_ID_HEX")
        echo "L1 chain ID: $$L1_CHAIN_ID"
        L2_CHAIN_ID_HEX=$$(printf "0x%064x" ${L2_CHAIN_ID:-10200})
        op-deployer init \
          --l1-chain-id "$$L1_CHAIN_ID" \
          --l2-chain-ids ${L2_CHAIN_ID:-10200} \
          --workdir /l2-data \
          --intent-type custom
        L1_LOCATOR=$$(grep '^l1ContractsLocator' /l2-data/intent.toml | sed 's/l1ContractsLocator = "\(.*\)"/\1/')
        L2_LOCATOR=$$(grep '^l2ContractsLocator' /l2-data/intent.toml | sed 's/l2ContractsLocator = "\(.*\)"/\1/')
        echo "L1 locator: $$L1_LOCATOR"
        echo "L2 locator: $$L2_LOCATOR"
        cat > /l2-data/intent.toml <<TOML
        configType = "custom"
        l1ChainID = $$L1_CHAIN_ID
        l1ContractsLocator = "$$L1_LOCATOR"
        l2ContractsLocator = "$$L2_LOCATOR"
        fundDevAccounts = true
        useInterop = false
        opcmAddress = "$$OPCM_ADDRESS"

        [[chains]]
        id = "$$L2_CHAIN_ID_HEX"
        baseFeeVaultRecipient = "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
        l1FeeVaultRecipient = "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
        sequencerFeeVaultRecipient = "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
        operatorFeeVaultRecipient = "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
        eip1559Denominator = 50
        eip1559DenominatorCanyon = 250
        eip1559Elasticity = 6
        gasLimit = 60_000_000

        [chains.roles]
        l1ProxyAdminOwner = "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
        l2ProxyAdminOwner = "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
        systemConfigOwner = "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
        unsafeBlockSigner = "0x70997970C51812dc3A010C7d01b50e0d17dc79C8"
        batcher = "0x3C44CdDdB6a900fa2b585dd299e03d12FA4293BC"
        proposer = "0x70997970C51812dc3A010C7d01b50e0d17dc79C8"
        challenger = "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
        TOML
        echo "intent.toml written:"
        cat /l2-data/intent.toml
    volumes:
      - deployments:/deployments:ro
      - l2-data:/l2-data
    depends_on:
      bootstrap-implementations:
        condition: service_completed_successfully

  # Deploy L2 chain contracts to L1
  l2-deploy-apply:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-deployer@sha256:793b0b2d306a9b102fb329c83ab1bc08e0c82627ff512e817914062654ace202
    platform: linux/amd64
    container_name: l2-deploy-apply
    profiles: ["l2"]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "=== L2 Deploy Apply ==="
        op-deployer apply \
          --workdir /l2-data \
          --l1-rpc-url ${L1_RPC_URL:-http://geth:8545} \
          --private-key ${DEPLOYER_ACCOUNT:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}
        echo "L2 contracts deployed successfully"
    volumes:
      - l2-data:/l2-data
    depends_on:
      l2-deploy-init:
        condition: service_completed_successfully

  # Extract genesis, rollup config, and generate JWT
  l2-deploy-inspect:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-deployer@sha256:793b0b2d306a9b102fb329c83ab1bc08e0c82627ff512e817914062654ace202
    platform: linux/amd64
    container_name: l2-deploy-inspect
    profiles: ["l2"]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "=== L2 Deploy Inspect ==="
        op-deployer inspect genesis \
          --workdir /l2-data \
          ${L2_CHAIN_ID:-10200} > /l2-data/genesis.json
        echo "Genesis written to /l2-data/genesis.json"
        op-deployer inspect rollup \
          --workdir /l2-data \
          ${L2_CHAIN_ID:-10200} > /l2-data/rollup.json
        echo "Rollup config written to /l2-data/rollup.json"
        od -A n -t x1 -N 32 /dev/urandom | tr -d ' \n' > /l2-data/jwt.txt
        echo ""
        echo "JWT secret written to /l2-data/jwt.txt"
    volumes:
      - l2-data:/l2-data
    depends_on:
      l2-deploy-apply:
        condition: service_completed_successfully

  # Fund sequencer and batcher accounts on L1
  l2-fund-accounts:
    image: ghcr.io/foundry-rs/foundry@sha256:9e591221051112fe0bb530abcaba67f43f01ebbd12a94a8632d570d5e065a8bf
    container_name: l2-fund-accounts
    profiles: ["l2"]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "=== Funding L2 Accounts ==="
        cast send 0x70997970C51812dc3A010C7d01b50e0d17dc79C8 \
          --value 100ether \
          --private-key ${DEPLOYER_ACCOUNT:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80} \
          --rpc-url ${L1_RPC_URL:-http://geth:8545}
        echo "Funded sequencer (0x70997970C51812dc3A010C7d01b50e0d17dc79C8) with 100 ETH"
        cast send 0x3C44CdDdB6a900fa2b585dd299e03d12FA4293BC \
          --value 100ether \
          --private-key ${DEPLOYER_ACCOUNT:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80} \
          --rpc-url ${L1_RPC_URL:-http://geth:8545}
        echo "Funded batcher (0x3C44CdDdB6a900fa2b585dd299e03d12FA4293BC) with 100 ETH"
        echo "L2 deployment complete!"
    depends_on:
      l2-deploy-inspect:
        condition: service_completed_successfully

  # ========== L2 Runtime Services (OP Stack) ==========

  # Initialize op-reth with L2 genesis
  op-reth-init:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-reth:v1.11.0
    container_name: op-reth-init
    profiles: ["l2"]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        op-reth init --chain /l2-data/genesis.json --datadir /l2-execution-data
    volumes:
      - op-reth-data:/l2-execution-data
      - l2-data:/l2-data:ro
    depends_on:
      l2-fund-accounts:
        condition: service_completed_successfully

  # L2 Execution Engine - op-reth
  op-reth:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-reth:v1.11.0
    container_name: op-reth
    profiles: ["l2"]
    command:
      - node
      - --chain=/l2-data/genesis.json
      - --datadir=/l2-execution-data
      - --http
      - --http.addr=0.0.0.0
      - --http.port=9545
      - --http.api=eth,net,web3,debug,txpool
      - --http.corsdomain=*
      - --ws
      - --ws.addr=0.0.0.0
      - --ws.port=9546
      - --ws.api=eth,net,web3,debug,txpool
      - --ws.origins=*
      - --authrpc.addr=0.0.0.0
      - --authrpc.port=9551
      - --authrpc.jwtsecret=/l2-data/jwt.txt
      - --rollup.disable-tx-pool-gossip
      - --disable-discovery
    ports:
      - "9545:9545"
      - "9546:9546"
      - "9551:9551"
    volumes:
      - op-reth-data:/l2-execution-data
      - l2-data:/l2-data:ro
    depends_on:
      op-reth-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:9545"]
      interval: 3s
      timeout: 3s
      retries: 30

  # L2 Consensus / Derivation - op-node
  op-node:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-node@sha256:97853e10aea44c86567b8ca86322972c493f6d3a79d31e3981f9bfccb54eab2d
    container_name: op-node
    profiles: ["l2"]
    entrypoint: ["/bin/sh", "-c"]
    environment:
      - L1_CHAIN_CONFIG=${L1_CHAIN_CONFIG:-/genesis-data/metadata/genesis.json}
    command:
    - |
      if echo "$$L1_CHAIN_CONFIG" | grep -q '^http'; then
        wget -qO /tmp/l1-genesis-raw.json "$$L1_CHAIN_CONFIG"
        sed '/"terminalTotalDifficultyPassed"/d' /tmp/l1-genesis-raw.json > /tmp/l1-genesis.json
        L1_CONFIG_FLAG="--rollup.l1-chain-config=/tmp/l1-genesis.json"
      elif [ -f "$$L1_CHAIN_CONFIG" ]; then
        sed '/"terminalTotalDifficultyPassed"/d' "$$L1_CHAIN_CONFIG" > /tmp/l1-genesis.json
        L1_CONFIG_FLAG="--rollup.l1-chain-config=/tmp/l1-genesis.json"
      else
        L1_CONFIG_FLAG=""
      fi
      exec op-node \
        --l1=${L1_RPC_URL:-http://geth:8545} \
        --l1.beacon=${L1_BEACON_URL:-http://lighthouse:5052} \
        --l2=http://op-reth:9551 \
        --l2.jwt-secret=/l2-data/jwt.txt \
        --rollup.config=/l2-data/rollup.json \
        --rpc.addr=0.0.0.0 \
        --rpc.port=8547 \
        --sequencer.enabled \
        --sequencer.l1-confs=0 \
        --p2p.disable \
        --p2p.sequencer.key=59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d \
        --l1.trustrpc \
        $$L1_CONFIG_FLAG
    ports:
      - "8547:8547"
    volumes:
      - l2-data:/l2-data:ro
      - genesis-data:/genesis-data:ro
    depends_on:
      l2-el-ready:
        condition: service_completed_successfully
    restart: unless-stopped

  # L2 Batch Submitter - op-batcher
  op-batcher:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-batcher@sha256:b737345560e429fbc3a5549a4a396d684108ca4147ec069e2ec5e2b752cb8447
    container_name: op-batcher
    profiles: ["l2"]
    command:
      - op-batcher
      - --l1-eth-rpc=${L1_RPC_URL:-http://geth:8545}
      - --l2-eth-rpc=http://op-reth:9545
      - --rollup-rpc=http://op-node:8547
      - --private-key=0x5de4111afa1a4b94908f83103eb1f1706367c2e68ca870fc3fb9a804cdab365a
      - --data-availability-type=blobs
      - --max-channel-duration=1
      - --poll-interval=1s
      - --num-confirmations=1
      - --sub-safety-margin=4
      - --wait-node-sync=false
      - --rpc.addr=0.0.0.0
      - --rpc.port=8548
    ports:
      - "8548:8548"
    depends_on:
      op-node:
        condition: service_started
    restart: unless-stopped

  # L1 EL readiness check - exits when blocks are being produced and indexing is complete
  l1-el-ready:
    image: ghcr.io/foundry-rs/foundry@sha256:9e591221051112fe0bb530abcaba67f43f01ebbd12a94a8632d570d5e065a8bf
    container_name: l1-el-ready
    profiles: ["l1"]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for L1 EL to be ready..."
        while true; do
          BLOCK=$$(cast block-number --rpc-url ${L1_RPC_URL:-http://geth:8545} 2>/dev/null || echo "0")
          if [ "$$BLOCK" != "0" ] && [ -n "$$BLOCK" ]; then
            if cast logs --from-block 1 --to-block 1 --rpc-url ${L1_RPC_URL:-http://geth:8545} >/dev/null 2>&1; then
              echo "L1 EL is ready. Block: $$BLOCK, indexing complete."
              exit 0
            fi
            echo "Block $$BLOCK exists, waiting for indexing..."
          else
            echo "Waiting for block 1..."
          fi
          sleep 2
        done

  # L2 EL readiness check - exits when op-reth RPC is responsive
  l2-el-ready:
    image: ghcr.io/foundry-rs/foundry@sha256:9e591221051112fe0bb530abcaba67f43f01ebbd12a94a8632d570d5e065a8bf
    container_name: l2-el-ready
    profiles: ["l2"]
    depends_on:
      op-reth:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for L2 EL to be ready..."
        while true; do
          if cast block-number --rpc-url http://op-reth:9545 2>/dev/null; then
            echo "L2 EL is ready."
            exit 0
          fi
          echo "Waiting for op-reth..."
          sleep 2
        done
volumes:
  genesis-data:
  geth-data:
  lighthouse-data:
  validator-keys:
  blob-data:
  deployments:
  l2-data:
  op-reth-data:
