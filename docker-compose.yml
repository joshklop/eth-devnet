configs:
  values-env:
    content: |
      export SECONDS_PER_SLOT=6
      export NUMBER_OF_VALIDATORS=1
      export EL_AND_CL_MNEMONIC='test test test test test test test test test test test junk'
      export GENESIS_TIMESTAMP=$(date +%s)
      export GENESIS_DELAY=20

services:
  # Genesis generator - creates all config files
  genesis:
    image: ethpandaops/ethereum-genesis-generator:5.2.2
    container_name: genesis
    command: all
    configs:
      - source: values-env
        target: /config/values.env
    volumes:
      - genesis-data:/data

  # Execution Layer - Geth
  geth:
    image: ethereum/client-go:stable
    container_name: geth
    command:
      - --datadir=/execution-data
      - --http
      - --http.addr=0.0.0.0
      - --http.port=8545
      - --http.api=eth,net,web3,debug,txpool,engine,admin,personal
      - --http.corsdomain=*
      - --http.vhosts=*
      - --ws
      - --ws.addr=0.0.0.0
      - --ws.port=8546
      - --ws.api=eth,net,web3,debug,txpool,engine
      - --ws.origins=*
      - --authrpc.addr=0.0.0.0
      - --authrpc.port=8551
      - --authrpc.vhosts=*
      - --authrpc.jwtsecret=/genesis-data/metadata/jwtsecret
      - --syncmode=full
      - --gcmode=archive
      - --nodiscover
      - --maxpeers=0
      - --verbosity=3
      - --miner.gasprice=1
      - --miner.recommit=100ms
      - --rpc.allow-unprotected-txs
    ports:
      - "8545:8545"
      - "8546:8546"
      - "8551:8551"
    volumes:
      - geth-data:/execution-data
      - genesis-data:/genesis-data
    depends_on:
      geth-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8545"]
      interval: 3s
      timeout: 3s
      retries: 30

  # Initialize Geth
  geth-init:
    image: ethereum/client-go:latest
    container_name: geth-init
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ ! -d /execution-data/geth ]; then
          geth init --datadir=/execution-data /genesis-data/metadata/genesis.json
        fi
    volumes:
      - geth-data:/execution-data
      - genesis-data:/genesis-data
    depends_on:
      genesis:
        condition: service_completed_successfully

  # Consensus Layer - Lighthouse
  lighthouse:
    image: sigp/lighthouse:latest
    container_name: lighthouse
    command:
      - lighthouse
      - bn
      - --datadir=/consensus-data
      - --testnet-dir=/genesis-data/metadata
      - --execution-endpoint=http://geth:8551
      - --execution-jwt=/genesis-data/metadata/jwtsecret
      - --http
      - --http-address=0.0.0.0
      - --http-port=5052
      - --http-allow-origin=*
      - --disable-discovery
      - --disable-peer-scoring
      - --staking
      - --allow-insecure-genesis-sync
      - --debug-level=info
    ports:
      - "5052:5052"
      - "9000:9000"
    volumes:
      - lighthouse-data:/consensus-data
      - genesis-data:/genesis-data
    depends_on:
      geth:
        condition: service_healthy
    restart: unless-stopped

  # Generate validator keys
  validator-keygen:
    image: ethpandaops/ethereum-genesis-generator:5.2.2
    container_name: validator-keygen
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        source /defaults/defaults.env
        source /values.env
        eth2-val-tools \
          keystores \
          --insecure \
          --out-loc /validator-keys/keys \
          --source-min 0 \
          --source-max "$$NUMBER_OF_VALIDATORS" \
          --source-mnemonic "$$EL_AND_CL_MNEMONIC"
    configs:
      - source: values-env
        target: /values.env
    volumes:
      - validator-keys:/validator-keys

  # Serves genesis.json (and other metadata) over HTTP
  genesis-server:
    image: python:3-alpine
    container_name: genesis-server
    command: python -m http.server 8080 --directory /genesis-data/metadata
    ports:
      - "8080:8080"
    volumes:
      - genesis-data:/genesis-data
    depends_on:
      genesis:
        condition: service_completed_successfully
    restart: unless-stopped

  # Validator Client - Lighthouse
  lighthouse-vc:
    image: sigp/lighthouse:latest
    container_name: lighthouse-vc
    command:
      - lighthouse
      - vc
      - --validators-dir=/validator-keys/keys/keys
      - --secrets-dir=/validator-keys/keys/secrets
      - --testnet-dir=/genesis-data/metadata
      - --beacon-nodes=http://lighthouse:5052
      - --init-slashing-protection
      - --suggested-fee-recipient=0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266
      - --debug-level=info
    volumes:
      - validator-keys:/validator-keys
      - genesis-data:/genesis-data
    depends_on:
      lighthouse:
        condition: service_started
      validator-keygen:
        condition: service_completed_successfully
    restart: unless-stopped

  # Blob Archiver - archives blobs from the beacon chain to local storage
  blob-archiver:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/blob-archiver:f6291e537bd9de2c3bb415cace47812b3cc19f87
    platform: linux/amd64
    container_name: blob-archiver
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for lighthouse beacon API..."
        until wget -qO /tmp/genesis.json http://lighthouse:5052/eth/v1/beacon/headers/genesis 2>/dev/null; do
          sleep 2
        done
        GENESIS_ROOT=$$(sed 's/.*"root":"\([^"]*\)".*/\1/' /tmp/genesis.json)
        echo "Genesis block root: $$GENESIS_ROOT"
        export BLOB_ARCHIVER_ORIGIN_BLOCK=$$GENESIS_ROOT
        exec blob-archiver
    environment:
      - BLOB_ARCHIVER_L1_BEACON_HTTP=http://lighthouse:5052
      - BLOB_ARCHIVER_DATA_STORE=file
      - BLOB_ARCHIVER_FILE_DIRECTORY=/data
      - BLOB_ARCHIVER_METRICS_ENABLED=true
      - BLOB_ARCHIVER_METRICS_PORT=7300
    volumes:
      - blob-data:/data
    depends_on:
      lighthouse:
        condition: service_started
    restart: unless-stopped

  # Blob API - serves archived blobs over HTTP for OP Stack derivation
  blob-api:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/blob-archiver:f6291e537bd9de2c3bb415cace47812b3cc19f87
    platform: linux/amd64
    container_name: blob-api
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for lighthouse beacon API..."
        until wget -qO /dev/null http://lighthouse:5052/eth/v1/beacon/headers/head 2>/dev/null; do
          sleep 2
        done
        exec blob-api
    environment:
      - BLOB_API_L1_BEACON_HTTP=http://lighthouse:5052
      - BLOB_API_DATA_STORE=file
      - BLOB_API_FILE_DIRECTORY=/data
      - BLOB_API_METRICS_ENABLED=true
      - BLOB_API_METRICS_PORT=7301
    ports:
      - "5058:8000"
    volumes:
      - blob-data:/data
    depends_on:
      blob-archiver:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO", "-", "http://localhost:8000/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ========== L2 Deploy Services ==========

  # Deploy OP Stack contracts to L1
  op-deploy:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: op-deploy
    user: root
    entrypoint: ["/bin/sh", "-c"]
    command:
      - apt-get update && apt-get install -y jq && /scripts/op.sh
    environment:
      - L1_RPC_URL=http://geth:8545
      - OUTPUT_DIR=/deployments
      - OPTIMISM_DIR=/optimism
    volumes:
      - ./op.sh:/scripts/op.sh:ro
      - ${OPTIMISM_DIR}:/optimism
      - deployments:/deployments
    depends_on:
      chain-ready:
        condition: service_completed_successfully

  # Generate L2 genesis and rollup config
  l2-deploy:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: l2-deploy
    user: root
    entrypoint: ["/bin/sh", "-c"]
    command:
      - apt-get update && apt-get install -y jq && /scripts/l2.sh
    environment:
      - L1_RPC_URL=http://geth:8545
      - DEPLOY_DIR=/deployments
      - L2_DATA_DIR=/l2-data
      - OPTIMISM_DIR=/optimism
    volumes:
      - ./l2.sh:/scripts/l2.sh:ro
      - ${OPTIMISM_DIR}:/optimism:ro
      - deployments:/deployments:ro
      - l2-data:/l2-data
    depends_on:
      op-deploy:
        condition: service_completed_successfully

  # ========== L2 Runtime Services (OP Stack) ==========

  # Initialize op-reth with L2 genesis
  op-reth-init:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-reth:v1.11.0
    container_name: op-reth-init
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        op-reth init --chain /l2-data/genesis.json --datadir /l2-execution-data
    volumes:
      - op-reth-data:/l2-execution-data
      - l2-data:/l2-data:ro
    depends_on:
      l2-deploy:
        condition: service_completed_successfully

  # L2 Execution Engine - op-reth
  op-reth:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-reth:v1.11.0
    container_name: op-reth
    command:
      - node
      - --chain=/l2-data/genesis.json
      - --datadir=/l2-execution-data
      - --http
      - --http.addr=0.0.0.0
      - --http.port=9545
      - --http.api=eth,net,web3,debug,txpool
      - --http.corsdomain=*
      - --ws
      - --ws.addr=0.0.0.0
      - --ws.port=9546
      - --ws.api=eth,net,web3,debug,txpool
      - --ws.origins=*
      - --authrpc.addr=0.0.0.0
      - --authrpc.port=9551
      - --authrpc.jwtsecret=/l2-data/jwt.txt
      - --rollup.disable-tx-pool-gossip
      - --disable-discovery
    ports:
      - "9545:9545"
      - "9546:9546"
      - "9551:9551"
    volumes:
      - op-reth-data:/l2-execution-data
      - l2-data:/l2-data:ro
    depends_on:
      op-reth-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9545 || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 30

  # L2 Consensus / Derivation - op-node
  op-node:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-node:latest
    container_name: op-node
    command:
      - op-node
      - --l1=http://geth:8545
      - --l1.beacon=http://lighthouse:5052
      - --l2=http://op-reth:9551
      - --l2.jwt-secret=/l2-data/jwt.txt
      - --rollup.config=/l2-data/rollup.json
      - --rpc.addr=0.0.0.0
      - --rpc.port=8547
      - --sequencer.enabled
      - --sequencer.l1-confs=0
      - --p2p.disable
      - --p2p.sequencer.key=59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d
      - --l1.trustrpc
    ports:
      - "8547:8547"
    volumes:
      - l2-data:/l2-data:ro
    depends_on:
      op-reth:
        condition: service_healthy
      geth:
        condition: service_healthy
    restart: unless-stopped

  # L2 Batch Submitter - op-batcher
  op-batcher:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-batcher:latest
    container_name: op-batcher
    command:
      - op-batcher
      - --l1-eth-rpc=http://geth:8545
      - --l2-eth-rpc=http://op-reth:9545
      - --rollup-rpc=http://op-node:8547
      - --private-key=0x5de4111afa1a4b94908f83103eb1f1706367c2e68ca870fc3fb9a804cdab365a
      - --data-availability-type=blobs
      - --max-channel-duration=1
      - --poll-interval=1s
      - --num-confirmations=1
      - --sub-safety-margin=4
      - --wait-node-sync=false
      - --rpc.addr=0.0.0.0
      - --rpc.port=8548
    ports:
      - "8548:8548"
    depends_on:
      op-node:
        condition: service_started
    restart: unless-stopped

  # Chain readiness check - exits when blocks are being produced and indexing is complete
  chain-ready:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: chain-ready
    depends_on:
      geth:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for chain to be ready..."
        while true; do
          BLOCK=$$(cast block-number --rpc-url http://geth:8545 2>/dev/null || echo "0")
          if [ "$$BLOCK" != "0" ] && [ -n "$$BLOCK" ]; then
            # Blocks exist, now verify indexing is complete by querying logs
            if cast logs --from-block 1 --to-block 1 --rpc-url http://geth:8545 >/dev/null 2>&1; then
              echo "Chain is ready. Block: $$BLOCK, indexing complete."
              exit 0
            fi
            echo "Block $$BLOCK exists, waiting for indexing..."
          else
            echo "Waiting for block 1..."
          fi
          sleep 2
        done
volumes:
  genesis-data:
  geth-data:
  lighthouse-data:
  validator-keys:
  blob-data:
  deployments:
  l2-data:
  op-reth-data:
